[workspace]
members = [
  # "omniserver",
  # "omniclient",
]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
esp-idf-svc = { version = "0.51", features = ["experimental", "alloc"] }
log = { version = "0.4", default-features = false }

heapless = { version = "0.9", default-features = false }

[package]
name = "omnibench"
authors = ["Alex Eden <alexandereden91@gmail.com>"]
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow.workspace = true
enumset = "1"
esp-idf-svc.workspace = true
heapless.workspace = true
log.workspace = true

